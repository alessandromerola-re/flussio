services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - uploads_data:/srv/flussio/uploads
      - backups_data:/srv/flussio/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}-backend:${FLUSSIO_VERSION}
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ATTACHMENT_MAX_MB: ${ATTACHMENT_MAX_MB:-20}
      RECURRING_GENERATOR_ENABLED: ${RECURRING_GENERATOR_ENABLED:-false}
      RECURRING_GENERATOR_INTERVAL_MIN: ${RECURRING_GENERATOR_INTERVAL_MIN:-5}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME}
      BOOTSTRAP_COMPANY_NAME: ${BOOTSTRAP_COMPANY_NAME}
      ENABLE_DEV_SEED: "false"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "4000"
    volumes:
      - uploads_data:/app/uploads
      - backups_data:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}-frontend:${FLUSSIO_VERSION}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${FRONTEND_HOST_PORT:-9808}:80'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db_data:
  uploads_data:
  backups_data:
