name: Release production bundle

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare production bundle
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist/flussio-production-bundle-${VERSION}
          cp deploy/production/docker-compose.prod.yml dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/docker-compose.prod.qnap.yml dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/.env.example.prod dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/install.sh dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/backup.sh dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/restore-test.sh dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/check-schema.sh dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/check_schema.sql dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/generate-secrets.sh dist/flussio-production-bundle-${VERSION}/
          mkdir -p dist/flussio-production-bundle-${VERSION}/docs
          cp deploy/production/docs/PRODUCTION_INSTALL.md dist/flussio-production-bundle-${VERSION}/docs/
          cp deploy/production/docs/GO_LIVE_CHECKLIST.md dist/flussio-production-bundle-${VERSION}/docs/
          cp deploy/production/docs/BACKUP_AND_RESTORE.md dist/flussio-production-bundle-${VERSION}/docs/
          sed -i "s/^FLUSSIO_VERSION=.*/FLUSSIO_VERSION=${VERSION}/" dist/flussio-production-bundle-${VERSION}/.env.example.prod

      - name: Create ZIP
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd dist
          zip -r flussio-production-bundle-${VERSION}.zip flussio-production-bundle-${VERSION}

      - name: Publish GitHub release with bundle
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/flussio-production-bundle-${{ github.ref_name }}.zip
