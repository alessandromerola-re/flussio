name: Release images + production bundle

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: flussio
          POSTGRES_PASSWORD: flussio
          POSTGRES_DB: flussio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U flussio -d flussio_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Check init schema duplicates
        run: python scripts/check_init_schema_duplicates.py

      - name: Check dashboard duplicate declarations
        run: python scripts/check_dashboard_duplicates.py

      - name: Run backend tests
        working-directory: ./backend
        env:
          JWT_SECRET: test_secret
          DATABASE_URL: postgres://flussio:flussio@localhost:5432/flussio_test
        run: npm test

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - image_suffix: backend
            context: .
            dockerfile: ./backend/Dockerfile
          - image_suffix: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

  release-bundle:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate production bundle sources
        run: ./scripts/validate_production_bundle.sh

      - name: Validate raw blob line counts
        run: |
          [[ "$(git show HEAD:deploy/production/docker-compose.prod.yml | wc -l)" -ge 20 ]]
          [[ "$(git show HEAD:deploy/production/docker-compose.prod.qnap.yml | wc -l)" -ge 20 ]]
          [[ "$(git show HEAD:deploy/production/.env.example.prod | wc -l)" -ge 10 ]]
          [[ "$(git show HEAD:scripts/validate_production_bundle.sh | wc -l)" -ge 15 ]]


      - name: Show bundle file line stats
        run: |
          wc -l deploy/production/docker-compose.prod.yml
          wc -l deploy/production/docker-compose.prod.qnap.yml
          wc -l deploy/production/.env.example.prod
          wc -l scripts/validate_production_bundle.sh

      - name: Validate production compose parseability
        run: |
          docker compose -f deploy/production/docker-compose.prod.yml config >/dev/null
          docker compose -f deploy/production/docker-compose.prod.qnap.yml config >/dev/null

      - name: Validate production scripts syntax
        run: |
          bash -n deploy/production/install.sh
          bash -n deploy/production/backup.sh
          bash -n deploy/production/check-schema.sh
          bash -n deploy/production/restore-test.sh
          bash -n deploy/production/generate-secrets.sh

      - name: Prepare production bundle
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist/flussio-production-bundle-${VERSION}
          cp deploy/production/docker-compose.prod.yml dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/docker-compose.prod.qnap.yml dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/.env.example.prod dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/install.sh dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/backup.sh dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/restore-test.sh dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/check-schema.sh dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/check_schema.sql dist/flussio-production-bundle-${VERSION}/
          cp deploy/production/generate-secrets.sh dist/flussio-production-bundle-${VERSION}/
          mkdir -p dist/flussio-production-bundle-${VERSION}/docs
          cp deploy/production/docs/PRODUCTION_INSTALL.md dist/flussio-production-bundle-${VERSION}/docs/
          cp deploy/production/docs/GO_LIVE_CHECKLIST.md dist/flussio-production-bundle-${VERSION}/docs/
          cp deploy/production/docs/BACKUP_AND_RESTORE.md dist/flussio-production-bundle-${VERSION}/docs/
          sed -i "s/^FLUSSIO_VERSION=.*/FLUSSIO_VERSION=${VERSION}/" dist/flussio-production-bundle-${VERSION}/.env.example.prod

      - name: Create ZIP
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd dist
          zip -r flussio-production-bundle-${VERSION}.zip flussio-production-bundle-${VERSION}

      - name: Publish GitHub release with bundle
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/flussio-production-bundle-${{ github.ref_name }}.zip
