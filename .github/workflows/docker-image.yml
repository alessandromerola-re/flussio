name: CI + Build Docker images

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: flussio
          POSTGRES_PASSWORD: flussio
          POSTGRES_DB: flussio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U flussio -d flussio_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate production bundle sources
        run: ./scripts/validate_production_bundle.sh

      - name: Show bundle file line stats
        run: |
          wc -l deploy/production/docker-compose.prod.yml
          wc -l deploy/production/docker-compose.prod.qnap.yml
          wc -l deploy/production/.env.example.prod
          wc -l scripts/validate_production_bundle.sh

      - name: Validate production compose parseability
        run: |
          docker compose -f deploy/production/docker-compose.prod.yml config >/dev/null
          docker compose -f deploy/production/docker-compose.prod.qnap.yml config >/dev/null

      - name: Validate production scripts syntax
        run: |
          bash -n deploy/production/install.sh
          bash -n deploy/production/backup.sh
          bash -n deploy/production/check-schema.sh
          bash -n deploy/production/restore-test.sh
          bash -n deploy/production/generate-secrets.sh

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Check init schema duplicates
        run: python scripts/check_init_schema_duplicates.py

      - name: Check dashboard duplicate declarations
        run: python scripts/check_dashboard_duplicates.py

      - name: Run backend tests
        working-directory: ./backend
        env:
          JWT_SECRET: test_secret
          DATABASE_URL: postgres://flussio:flussio@localhost:5432/flussio_test
        run: npm test

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - image_suffix: backend
            context: .
            dockerfile: ./backend/Dockerfile
          - image_suffix: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
